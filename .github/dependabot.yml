version: 2
updates:
  # Go modules (the daemon + edge-relay)
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix(deps)"
      include: scope
    labels:
      - dependencies
      - go
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  # Web UI (Vite + React)
  - package-ecosystem: npm
    directory: /web/app
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix(deps)"
      include: scope
    labels:
      - dependencies
      - web
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions versions across workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
      include: scope
    labels:
      - dependencies
      - ci
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

  # Docker base images
  - package-ecosystem: docker
    directories:
      - /docker
      - /cmd/edge-relay
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: "fix(deps)"
      include: scope
    labels:
      - dependencies
      - docker
